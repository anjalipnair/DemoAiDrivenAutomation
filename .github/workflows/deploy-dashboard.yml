name: Deploy Super Dashboard

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    # Only run if the Playwright tests were successful
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./artifacts
        continue-on-error: true

      - name: Generate Dashboard Data
        run: |
          # Copy test results if available
          if [ -d "artifacts" ]; then
            mkdir -p test-results playwright-report
            find artifacts -name "test-results" -type d -exec cp -r {}/* test-results/ \; 2>/dev/null || true
            find artifacts -name "playwright-report" -type d -exec cp -r {}/* playwright-report/ \; 2>/dev/null || true
          fi
          
          # Generate dashboard data
          node scripts/dashboard-processor.js || echo "✅ Using fallback data for dashboard"
          
          # Ensure dashboard is ready
          ls -la dashboard/
          echo "✅ Dashboard files prepared"

      - name: Upload Dashboard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-dashboard-${{ github.run_number }}
          path: dashboard/
          retention-days: 30

      - name: Dashboard Ready
        run: |
          echo "🎉 Super Dashboard generated successfully!"
          echo "📊 Dashboard available as artifact: super-dashboard-${{ github.run_number }}"
          echo "💻 Local development: npm run dashboard:serve"
          echo "🔗 Download from: Actions → This workflow run → Artifacts"