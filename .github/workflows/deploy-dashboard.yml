name: Deploy Super Dashboard

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-dashboard:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./artifacts
        continue-on-error: true

      - name: Generate Dashboard Data
        run: |
          # Copy test results if available
          if [ -d "artifacts" ]; then
            cp -r artifacts/*/test-results/* test-results/ 2>/dev/null || true
            cp -r artifacts/*/playwright-report/* playwright-report/ 2>/dev/null || true
          fi
          
          # Generate dashboard data
          node scripts/dashboard-processor.js || echo "Using fallback data"
          
          # Ensure dashboard directory exists
          mkdir -p dashboard
          
          # Copy dashboard files
          if [ ! -f "dashboard/index.html" ]; then
            echo "Dashboard HTML not found, using default"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on commit
        if: github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const dashboardUrl = '${{ steps.deployment.outputs.page_url }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: '${{ github.event.workflow_run.head_sha }}',
              body: `🎉 **Super Dashboard Updated!**\n\n📊 **Live Dashboard**: ${dashboardUrl}\n\n✨ View your beautiful test results with interactive charts and real-time data!`
            });