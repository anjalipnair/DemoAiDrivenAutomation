name: Playwright Tests

on:
  # Run on push to main/master branch
  push:
    branches: [ main, master ]
  
  # Run on pull requests
  pull_request:
    branches: [ main, master ]
  
  # Daily scheduled run at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Run tests on multiple browser projects
        project: [chromium, firefox, webkit]
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Playwright tests
      run: npx playwright test tests/auth/ tests/login-auth/ tests/login-validation/ tests/accessibility/ --project=${{ matrix.project }} --reporter=html,json
      env:
        CI: true
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 30
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.project }}
        path: test-results/
        retention-days: 7

  # Separate job for OrangeHRM specific tests
  orangehrm-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run OrangeHRM Solutions Tests
      run: npx playwright test tests/solutions/solutions-navigation.spec.ts --reporter=html,json
      env:
        CI: true
        BASE_URL: https://www.orangehrm.com
    
    - name: Upload OrangeHRM Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: orangehrm-test-results
        path: |
          playwright-report/
          test-results/
        retention-days: 30

  # Notification job
  notify:
    needs: [test, orangehrm-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Report Test Results
      run: |
        echo "Test execution completed"
        echo "Status: ${{ needs.test.result }} / ${{ needs.orangehrm-tests.result }}"