stages:
  - install
  - test
  - report

variables:
  NODE_VERSION: "18"
  CI: "true"
  BASE_URL: "https://www.orangehrm.com"

# Daily schedule: Run at 6 AM UTC every day
schedule:daily:
  stage: test
  only:
    - schedules
  script:
    - echo "Running scheduled daily tests"

# Cache node modules for faster builds
cache:
  paths:
    - node_modules/
    - ~/.cache/ms-playwright/

install:
  stage: install
  image: node:18-alpine
  script:
    - npm ci
    - npx playwright install --with-deps
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Test jobs running in parallel
test:chromium:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  dependencies:
    - install
  script:
    - npm ci
    - npx playwright test --project=chromium --reporter=html,json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/results.xml

test:firefox:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  dependencies:
    - install
  script:
    - npm ci
    - npx playwright test --project=firefox --reporter=html,json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-report/
      - test-results/

test:webkit:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  dependencies:
    - install
  script:
    - npm ci
    - npx playwright test --project=webkit --reporter=html,json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-report/
      - test-results/

# OrangeHRM specific tests
test:orangehrm:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  dependencies:
    - install
  script:
    - npm ci
    - npx playwright test tests/solutions/ --reporter=html,json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-report/
      - test-results/

# Generate consolidated report
report:
  stage: report
  image: node:18-alpine
  dependencies:
    - test:chromium
    - test:firefox
    - test:webkit
    - test:orangehrm
  script:
    - echo "All tests completed"
    - ls -la test-results/
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - playwright-report/
    reports:
      junit: test-results/*.xml